# =============================================================================
# COPY TO config.yaml — fill in YOUR codes and YOUR API keys only.
# NEVER commit config.yaml. NEVER use someone else's API key (quota is per user).
# See docs/API_KEYS.md
# =============================================================================

affiliate:
  stake:
    ref_code: "YOUR_STAKE_CODE"
    url: "https://stake.com/?c=YOUR_STAKE_CODE"
    commission: "$50-200 per depositor"
  cloudbet:
    ref_code: "YOUR_CLOUDBET_CODE"
    url: "https://cloudbet.com/en/auth/sign-up?referrer=YOUR_CLOUDBET_CODE"
    commission: "varies"
  bcgame:
    ref_code: "YOUR_BCGAME_CODE"
    url: "https://bc.game/?i=YOUR_BCGAME_CODE"
    commission: "varies"

bot:
  bankroll: 7.0
  min_surebet_profit_pct: 0.1
  min_middle_profit: 0.5
  auto_execute: false   # KEEP FALSE until tested
  dry_run: true

platforms:
  - stake
  - cloudbet

# --- YOUR API keys (register yourself) ---
# The-Odds-API: https://the-odds-api.com/#get-access  (~500 credits/month)
the_odds_api:
  key: "YOUR_THE_ODDS_API_KEY"

# API-Football (optional): https://dashboard.api-football.com/register
# No separate "World Cup API" — copy dashboard API Key, tool filters leagues
api_football:
  key: "YOUR_API_FOOTBALL_KEY"
  base_url: "https://v3.football.api-sports.io"

# Browser agent (optional) — see docs/BROWSER_AGENT.md
browser_agent:
  preferred: "playbook"   # playbook | playwright | browser-use
  session_dir: ".sessions"

# Env overrides (no file edit): WC_ARB_THE_ODDS_API_KEY, WC_ARB_API_FOOTBALL_KEY,
# WC_ARB_STAKE_REF, WC_ARB_CLOUDBET_REF, WC_ARB_BCGAME_REF