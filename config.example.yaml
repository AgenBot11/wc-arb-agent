# Copy to config.yaml and fill in your affiliate referral codes.

affiliate:
  stake:
    ref_code: "YOUR_STAKE_CODE"
    url: "https://stake.com/?c=YOUR_STAKE_CODE"
    commission: "$50-200 per depositor"
  cloudbet:
    ref_code: "YOUR_CLOUDBET_CODE"
    url: "https://cloudbet.com/en/auth/sign-up?referrer=YOUR_CLOUDBET_CODE"
    commission: "varies"
  bcgame:
    ref_code: "YOUR_BCGAME_CODE"
    url: "https://bc.game/?i=YOUR_BCGAME_CODE"
    commission: "varies"

bot:
  bankroll: 7.0
  min_surebet_profit_pct: 0.1
  min_middle_profit: 0.5
  auto_execute: false   # KEEP FALSE until tested
  dry_run: true

platforms:
  - stake
  - cloudbet

# Live odds from The-Odds-API (100 free requests/month)
# https://the-odds-api.com — enables `python cli.py scan --live`
the_odds_api:
  key: "YOUR_THE_ODDS_API_KEY"

# Live fixtures + events for Agent signals
# https://www.api-football.com — enables `python cli.py fixtures`
api_football:
  key: "YOUR_API_FOOTBALL_KEY"
  base_url: "https://v3.football.api-sports.io"

# Override affiliate codes via env (optional, never commit):
#   WC_ARB_STAKE_REF, WC_ARB_STAKE_URL
#   WC_ARB_CLOUDBET_REF, WC_ARB_BCgame_REF
#   WC_ARB_API_FOOTBALL_KEY, WC_ARB_THE_ODDS_API_KEY